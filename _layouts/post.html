---
layout: default
title: Abstraction
---

<article class="main-content">
  <nav style="margin-bottom: 25px;">
    <a href="{{ site.baseurl }}/" style="text-decoration: none; color: #666; font-size: 0.9rem;">back</a>
  </nav>

  <header style="text-align: center;">
    <h1 style="margin-top: 0 !important; color:#000000">{{ page.title }}</h1>
    <div style="display: flex; align-items: center; justify-content: center;">
    <img src="https://github.com/yeonsolkim.png" alt="yeonsolkim" 
         style="width: 35px; height: 35px; border-radius: 50%; border: 1px solid #eee;">
    </div>
    <span style="font-weight:500; color: #373737; font-size: 1rem;">Yeonsol Kim</span>
    <p style="color: #666; margin-top: 0; margin-bottom: 50px; font-weight: lighter; font-size: 0.8rem; ">{{ page.date | date: "%B %d, %Y" }}</p>
  </header>

  <hr>

  <div class="post-body">
    {{ content }}
  </div>

  <hr style="margin-top: 50px;">

  <div id="comment-section">
    <script src="https://giscus.app/client.js"
        data-repo="yeonsolkim/blog"
        data-repo-id="R_kgDOR8ku5Q"
        data-category="Announcements"
        data-category-id="DIC_kwDOR8ku5c4C6V6d"
        data-mapping="pathname"
        data-strict="0"
        data-reactions-enabled="1"
        data-emit-metadata="0"
        data-input-position="bottom"
        data-theme="preferred_color_scheme"
        data-lang="en"
        crossorigin="anonymous"
        async>
    </script>
  </div>
</article>

<script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<style>
  .main-content a:hover { text-decoration: underline !important; color: #000 !important; }
  .main-content {
    width: 100% !important;
    box-sizing: border-box !important;
    max-width: 65rem !important; 
    padding: 2rem 4rem;
    margin: 0 auto;
    word-wrap: break-word;
    line-height: 1.6;
    color: #333;
  }
  .post-body h1, 
  .post-body h2, 
  .post-body h3, 
  .post-body h4, 
  .post-body h5, 
  .post-body h6 {
    color: #333 !important; 
    font-weight: bold;
    margin-top: 2rem;
    margin-bottom: 0 rem;
  }
  
  .post-body ul {
    list-style-type: disc !important; 
    padding-left: 2rem;
    margin-bottom: 1.45rem;
  }
  
  .post-body ul li::marker {
    color: #00000041; 
    font-size: 0.85em;
  }
  
  .post-body ul li p {
    margin-top: 0 !important;
    margin-bottom: 0 !important;
    display: inline; 
  }
 

  .post-body ul li {
    margin-top: 5px !important;    
    margin-bottom: 5px !important;
    line-height: 1.5;
  }

  .post-body ul ul, 
  .post-body ul ol {
    margin-top: 0 !important;
    margin-bottom: 0 !important;
  }

  .post-body img, .post-body canvas, .post-body svg {
    max-width: 100%;
  }

 @media screen and (max-width: 600px) {
  .main-content {
    padding: 1.5rem;
   }
  }
</style>

<style>
  ol {
    list-style: none;
    counter-reset: line-counter;
    padding-left: 2.35rem;
  }

  /* ol 바로 밑의 li만 숫자를 매깁니다 */
  ol > li {
    counter-increment: line-counter;
    position: relative;
    margin-bottom: 10px;
    line-height: 1.2;
  }

  /* 숫자 스타일 역시 직계 자식 li의 앞부분에만 붙입니다 */
  ol > li::before {
    content: counter(line-counter) ".";
    position: absolute;
    color: #00000046; 
    font-weight:normal;
    left: -1.5rem;
  }

  /* 2. 중첩된 ul(하위 목록) 스타일 복구 */
  /* ol 안의 ul 안에 있는 li들은 기본 점(disc) 모양으로 되돌립니다 */
  ol ul {
    list-style: disc; /* 또는 원하시는 모양 */
    padding-left: 0rem;
    margin-top: 5px;
    margin-bottom: 0px !important;
  }

  ol ul li {
    /* 숫자를 매기지 않도록 가상 요소 초기화 */
    position: static; 
  }

  ol ul li::before {
    content: none; /* 하위 리스트에서 숫자가 나타나는 것을 방지 */
  }

  .site-footer {
    max-width: 800px;   /* 원하는 너비 */
    margin: 0 auto;     /* 가운데 정렬 */
  }
  
</style>
