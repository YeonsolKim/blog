---
layout: default
title: Abstraction
---

<article class="main-content">
  <nav style="margin-bottom: 25px;">
    <a href="{{ site.baseurl }}/" style="text-decoration: none; color: #666; font-size:medium;">back</a>
  </nav>

  <header style="text-align: center;">
    <h1 style="margin-top: 0; color:#000000">{{ page.title }}</h1>
    <div style="display: flex; align-items: center; justify-content: center;">
    <img src="https://github.com/yeonsolkim.png" alt="yeonsolkim" 
         style="width: 40px; height: 40px; border-radius: 50%; border: 1px solid #eee;">
    </div>
    <span style="font-weight:500; color: #373737; font-size: medium;">YeonsolKim</span>
    <p style="color: #666; margin-bottom: 50px; font-weight: lighter; font-size: small;">{{ page.date | date: "%B %d, %Y" }}</p>
  </header>

  <hr>

  <div class="post-body">
    {{ content }}
  </div>

  <hr style="margin-top: 50px;">

  <div id="comment-section">
    <script src="https://giscus.app/client.js"
        data-repo="yeonsolkim/blog"
        data-repo-id="R_kgDOR8ku5Q"
        data-category="Announcements"
        data-category-id="DIC_kwDOR8ku5c4C6V6d"
        data-mapping="pathname"
        data-strict="0"
        data-reactions-enabled="1"
        data-emit-metadata="0"
        data-input-position="bottom"
        data-theme="preferred_color_scheme"
        data-lang="en"
        crossorigin="anonymous"
        async>
    </script>
  </div>
</article>

<script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<style>
  .main-content {
    max-width: 65rem; 
    padding: 2rem 4rem;
    margin: 0 auto;
    word-wrap: break-word;
    line-height: 1.7;
    color: #333;
  }
  .post-body h1, 
  .post-body h2, 
  .post-body h3, 
  .post-body h4, 
  .post-body h5, 
  .post-body h6 {
    color: #333 !important; /* 강제로 검정색 적용 */
    font-weight: bold;
    margin-top: 2rem;
    margin-bottom: 1rem;
  }
  
  .post-body ul {
    list-style-type: disc !important; /* 항상 꽉 찬 원형 점 사용 */
    padding-left: 2rem;
    margin-bottom: 1.5rem;
  }

  .post-body ul li::marker {
    color: #333; /* 점 색상을 완전한 검정색으로 */
    font-size: 0.85em; /* 점 크기를 글자보다 약간 작게 조절 */
  }
  
  /* 리스트 내부의 p 태그 마진 제거 */
.post-body ul li p {
  margin-top: 0 !important;
  margin-bottom: 0 !important;
  display: inline; /* 단락이 아닌 일반 텍스트처럼 취급 */
}

/* 리스트 항목 자체의 간격을 일정하게 고정 */
.post-body ul li {
  margin-top: 5px !important;    /* 항목 사이의 미세한 간격 조절 */
  margin-bottom: 5px !important;
  line-height: 1.6;
}

/* 중첩된 리스트(상하위 리스트) 사이의 마진도 정리 */
.post-body ul ul, 
.post-body ul ol {
  margin-top: 0 !important;
  margin-bottom: 0 !important;
}

.post-body {
  text-align: justify;
}

  /* 수식이나 코드가 넘칠 경우를 대비 */
.post-body img, .post-body canvas, .post-body svg {
  max-width: 100%;
}

@media screen and (max-width: 600px) {
  .main-content {
    padding: 1.5rem;
  }
}
</style>
