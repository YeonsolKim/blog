<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script>
  window.MathJax = {
    tex: {
      inlineMath: [['$', '$'], ['\\(', '\\)']],
      displayMath: [['$$', '$$'], ['\\[', '\\]']],
      processEscapes: true
    },
    options: {
      enableMenu: false 
    },
    svg: {
      fontCache: 'global',
      scale: 0.89,
      exFactor: 0.5,
      displayAlign: 'center'
    }
  };
  </script>

  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-svg.js"></script>

  <style>
    .MathJax svg {
    vertical-align: middle !important;
    margin-bottom: 0.1ex !important;
    }
  </style>

   {% seo %}
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

  <style>
    .page-header {
      background-color: {{ site.banner_color_start | default: "#000000" }} !important;
      background-image: linear-gradient(to bottom, 
        {{ site.banner_color_start | default: "#000000" }}, 
        {{ site.banner_color_end | default: "#ffffff" }}
      ) !important;
      padding: 5rem 6rem !important;
      text-align: center;
    }

    .project-name, .project-tagline {
      color: #ffffff !important;
    }


    .main-content {
      max-width: 54rem;
      margin: 0 auto;
      padding: 2rem 4rem;
      font-size: 0.8rem !important;
    }
    h1 { font-size: 1.5rem !important; }
    h2 { font-size: 1.3rem !important; }
    h3 { font-size: 1.1rem !important; }
    
    .page-header .btn {
      color: #ffffffa2 !important;
      border-color: rgba(255, 255, 255, 0.4) !important;
      background-color: rgba(255, 255, 255, 0.1) !important;
      transition: all 0.2s ease;
    }

    .page-header .btn:hover {
     background-color: rgba(255, 255, 255, 0.2) !important;
     border-color: rgba(255, 255, 255, 0.6) !important;
    }

    .header-buttons {
     display: flex;
     justify-content: center;
     gap: 10px;
     flex-wrap: wrap;
    }

    @media screen and (max-width: 64rem) {
      .main-content {
      font-size: 16px !important; 
      line-height: 1.5 !important;
      padding: 1.5rem 1.2rem !important;
      font-size: 0.8rem !important;
      }

      h1 { font-size: 1.5rem !important; }
      h2 { font-size: 1.3rem !important; }
      h3 { font-size: 1.1rem !important; }
    }
  </style>
</head>
<body>

  <section class="page-header">
    <h1 class="project-name">{{ site.fixed_banner_title | default: site.title }}</h1>
    <h2 class="project-tagline">{{ site.description }}</h2>
    <div class="header-buttons">
     <a href="{{ site.github.repository_url }}" class="btn">View on GitHub</a>
     <a href="{{ '/feed.xml' | relative_url }}" class="btn">RSS Feed</a>
    </div>
    <div id="busuanzi_container_site" style="display:none; margin-top: 15px; font-size: 0.85rem; color: rgba(255,255,255,0.7);">
      <span>Total Views: </span>
      <span id="busuanzi_value_site_pv" style="font-weight: bold;"></span>
      <span style="margin: 0 8px; opacity: 0.5;">|</span>
      <span>Visitors: </span>
      <span id="busuanzi_value_site_uv" style="font-weight: bold;"></span>
    </div>

    <script>
      var checkBusuanzi = setInterval(function() {
        var pv = document.getElementById('busuanzi_value_site_pv');
        if (pv && pv.innerText !== "") {
          document.getElementById('busuanzi_container_site').style.display = 'block';
          clearInterval(checkBusuanzi);
        }
      }, 500); 
    </script>
  </section>

  <main id="content" class="main-content" role="main">
    {{ content }}

    <footer class="site-footer">
      <p>&copy; {{ "now" | date: "%Y" }} {{ site.github.owner_name | default: "yeonsolkim" }}. All rights reserved.</p>
    </footer>
  </main>

</body>
</html>
